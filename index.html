<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soja Hisab — Smart GST Billing</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900&family=Tiro+Bangla&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f2f5;--sidebar:#0f1623;--topbar:#0f1623;
  --accent:#f97316;--accent2:#ea580c;--blue:#2563eb;--green:#16a34a;--red:#dc2626;
  --card:#fff;--border:#e5e7eb;--text:#0f172a;--muted:#6b7280;--light:#f9fafb;
  --shadow:0 1px 6px rgba(0,0,0,.09);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
input,select,textarea,button{font-family:inherit;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}

/* TOPBAR */
#topbar{background:var(--topbar);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.4);}
.logo-wrap{display:flex;align-items:center;gap:11px;}
#logo-mark{width:38px;height:38px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;flex-shrink:0;}
#app-name{font-weight:900;font-size:17px;color:#fff;letter-spacing:-0.3px;line-height:1;}
#app-tagline{font-size:10px;color:#94a3b8;letter-spacing:0.3px;}
.top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.lang-wrap{display:flex;border:1px solid #2d3748;border-radius:7px;overflow:hidden;}
.lang-btn{padding:4px 10px;border:none;background:transparent;color:#94a3b8;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;}
.lang-btn.active{background:var(--accent);color:#fff;}
#free-badge{font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px;cursor:pointer;background:rgba(249,115,22,.15);color:var(--accent);border:1px solid rgba(249,115,22,.3);}
#upgrade-top-btn{background:var(--green);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;display:none;}
#co-select{background:#1e2738;color:#e2e8f0;border:1px solid #2d3748;border-radius:7px;padding:5px 8px;font-size:12px;cursor:pointer;}
#add-co-btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:700;}

/* LAYOUT */
#app-body{display:flex;min-height:calc(100vh - 56px);}

/* SIDEBAR */
#sidebar{width:204px;background:var(--sidebar);padding:12px 8px;flex-shrink:0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.nav-section{font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.8px;padding:14px 10px 5px;}
.nav-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 11px;border:none;border-radius:8px;cursor:pointer;margin-bottom:2px;background:transparent;color:#8892a4;font-weight:500;font-size:13px;text-align:left;transition:all .15s;}
.nav-btn:hover{background:#161d2e;color:#e2e8f0;}
.nav-btn.active{background:rgba(249,115,22,.15);color:var(--accent);font-weight:700;border-left:3px solid var(--accent);padding-left:8px;}
.nav-btn.new-bill-btn{background:var(--accent);color:#fff;font-weight:700;margin-bottom:8px;}
.nav-btn.new-bill-btn:hover{background:var(--accent2);}
.nav-icon{font-size:15px;width:18px;text-align:center;}

/* MAIN */
#main{flex:1;padding:22px 26px;overflow:auto;min-width:0;}

/* PAGE HEADER */
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.page-title{font-size:20px;font-weight:900;color:var(--text);letter-spacing:-0.4px;}
.page-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500;}
.page-hdr-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-head{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:6px;}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sc,#2563eb);}
.stat-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-value{font-size:22px;font-weight:900;color:var(--sc,#2563eb);letter-spacing:-0.5px;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1.8fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.ghalf{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.gbill{display:grid;grid-template-columns:1fr 280px;gap:14px;}

/* FORM */
.fr{margin-bottom:10px;}
.fr label{font-size:10px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;}
.inp{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);background:#fff;transition:border-color .15s;}
.inp:focus{border-color:var(--accent);}

/* BUTTONS */
.btn-p{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-p:hover{background:var(--accent2);}
.btn-s{background:#fff;color:#374151;border:1.5px solid var(--border);border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-s:hover{background:var(--light);}
.btn-blue{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-green{background:var(--green);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-red{background:var(--red);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);background:var(--light);white-space:nowrap;}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f3f4f6;}
tr:hover td{background:#fafafa;}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.b-paid{background:#dcfce7;color:#166534;} .b-unpaid{background:#fef2f2;color:#991b1b;} .b-partial{background:#fffbeb;color:#92400e;}
.b-ok{background:#f0fdf4;color:#166534;} .b-low{background:#fffbeb;color:#92400e;} .b-out{background:#fef2f2;color:#991b1b;}
.b-igst{background:#eff6ff;color:#1d4ed8;} .b-cgst{background:#fdf4ff;color:#7c3aed;}

/* ACTION BTNS */
.ab{background:var(--light);border:1px solid var(--border);border-radius:6px;width:29px;height:29px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:13px;}
.ab-g{background:#dcfce7;color:#166534;border:none;border-radius:6px;width:29px;height:29px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:13px;}
.ab-r{background:#fef2f2;color:#dc2626;border:none;border-radius:6px;width:29px;height:29px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:13px;}
.acts{display:flex;gap:4px;}

/* FILTER TABS */
.ftabs{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;}
.ftab{padding:7px 13px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:#fff;color:var(--muted);font-family:inherit;}
.ftab.active{background:var(--accent);color:#fff;}

/* SEARCH */
.sbox{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;flex:1;min-width:180px;}
.sbox input{border:none;background:transparent;outline:none;font-size:13px;color:var(--text);width:100%;font-family:inherit;}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.modal{background:#fff;border-radius:16px;padding:26px;max-width:540px;width:100%;margin:16px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:17px;font-weight:800;color:var(--text);}
.close-btn{background:var(--light);border:none;border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);}

/* ITEMS TABLE */
.items-tbl th{background:var(--light);font-size:10px;}
.items-tbl td{padding:5px 6px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
.items-tbl td input,.items-tbl td select{padding:6px 7px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px;width:100%;background:#fff;}

/* TOTALS */
.tot-row{display:flex;justify-content:space-between;padding:5px 0;}
.tot-label{font-size:13px;color:var(--muted);}
.tot-val{font-size:13px;font-weight:600;}
.tot-final{display:flex;justify-content:space-between;padding:10px 0;border-top:2px solid var(--border);margin-top:6px;}
.due-box{display:flex;justify-content:space-between;padding:10px 14px;background:#fef2f2;border-radius:8px;margin-top:8px;border:1.5px solid #fecaca;}
.due-box.ok{background:#f0fdf4;border-color:#bbf7d0;}

/* PERIOD BTNS */
.period-btn{padding:7px 15px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--muted);font-weight:500;cursor:pointer;font-size:12px;font-family:inherit;}
.period-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;font-weight:700;}

/* GST BADGE */
.gst-type-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}

/* PAY TABS */
.pay-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.pay-tab{padding:8px 16px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--muted);font-weight:600;cursor:pointer;font-size:12px;font-family:inherit;display:flex;align-items:center;gap:6px;}
.pay-tab.active{border-color:var(--accent);background:rgba(249,115,22,.06);color:var(--accent);}

/* QR */
.qr-preview{width:140px;height:140px;border:2px dashed var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--light);overflow:hidden;cursor:pointer;}
.qr-preview img{width:100%;height:100%;object-fit:contain;}
.qr-placeholder{color:var(--muted);font-size:12px;text-align:center;padding:16px;}

/* HOW TO USE */
.how-tab{padding:8px 16px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--muted);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;}
.how-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.how-section{margin-bottom:24px;}
.how-section h3{font-size:15px;font-weight:800;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.how-step{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start;}
.how-step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.how-step-text{font-size:13px;line-height:1.65;color:#374151;}
.how-tip{background:#fffbeb;border:1.5px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-top:8px;}
.how-tip strong{color:#78350f;}

/* EMPTY */
.empty{padding:48px;text-align:center;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}

/* GST CALCULATOR */
.gst-calc-box{background:linear-gradient(135deg,#0f1623,#1e2738);border-radius:16px;padding:24px;color:#fff;margin-bottom:16px;}

/* PRINT MEDIA */
@media print{
  #topbar,#sidebar,#modal-area,.no-print,nav{display:none!important;}
  #main{padding:0!important;}
  body{background:#fff!important;}
}

/* RWD */
@media(max-width:960px){.stats-grid{grid-template-columns:repeat(2,1fr);}.g2{grid-template-columns:1fr;}.gbill{grid-template-columns:1fr;}}
@media(max-width:640px){#sidebar{display:none;}#main{padding:14px;}.stats-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo-wrap">
    <div id="logo-mark">SH</div>
    <div><div id="app-name">Soja Hisab</div><div id="app-tagline">Smart GST Billing</div></div>
  </div>
  <div class="top-actions">
    <div class="lang-wrap">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('hi')">हि</button>
      <button class="lang-btn" onclick="setLang('bn')">বাং</button>
    </div>

    <button id="upgrade-top-btn" onclick="showUpgrade()">✓ Active</button>

  </div>
</div>

<div id="app-body">
<nav id="sidebar">
  <button class="nav-btn new-bill-btn" onclick="goTo('new-bill')" id="nb-new-bill"><span class="nav-icon">＋</span><span id="sb-newbill-lbl">New Bill</span></button>
  <button class="nav-btn active" onclick="goTo('dashboard')" id="nb-dashboard"><span class="nav-icon">⊞</span><span id="sb-dashboard-lbl">Dashboard</span></button>
  <button class="nav-btn" onclick="goTo('bills')" id="nb-bills"><span class="nav-icon">🧾</span><span id="sb-bills-lbl">All Bills</span></button>
  <button class="nav-btn" onclick="goTo('customers')" id="nb-customers"><span class="nav-icon">👥</span><span id="sb-clients-lbl">Customers</span></button>
  <button class="nav-btn" onclick="goTo('stock')" id="nb-stock"><span class="nav-icon">📦</span><span id="sb-stock-lbl">Products</span></button>

  <div class="nav-section" id="sb-tools-lbl">Tools</div>
  <button class="nav-btn" onclick="goTo('gst-calc')" id="nb-gst-calc"><span class="nav-icon">🧮</span><span id="sb-gstcalc-lbl">GST Calculator</span></button>
  <div class="nav-section" id="sb-setup-lbl">Setup</div>
  <button class="nav-btn" onclick="goTo('payment-methods')" id="nb-payment-methods"><span class="nav-icon">💳</span><span id="sb-payment-lbl">Payment Setup</span></button>
  <button class="nav-btn" onclick="goTo('settings')" id="nb-settings"><span class="nav-icon">⚙</span><span id="sb-settings-lbl">Settings</span></button>
  <button class="nav-btn" onclick="goTo('how-to-use')" id="nb-how-to-use"><span class="nav-icon">📖</span><span id="sb-howto-lbl">How to Use</span></button>
</nav>

<main id="main">
  <div id="view-empty" style="display:none;flex-direction:column;align-items:center;justify-content:center;height:65vh;gap:14px;text-align:center;">
    <div style="font-size:60px">🧑‍💼</div>
    <h2 style="font-size:20px;font-weight:900;">No profile selected</h2>
    <p style="color:var(--muted);font-size:14px;">Add your shop or professional profile to get started!</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn-p" onclick="showCoModal('shop')">🏪 Add Shop</button>
      <button class="btn-blue" onclick="showCoModal('service')" style="background:var(--blue)">💼 Add Professional Profile</button>
    </div>
  </div>
  <div id="view-dashboard" style="display:none;"></div>
  <div id="view-new-bill" style="display:none;"></div>
  <div id="view-bills" style="display:none;"></div>
  <div id="view-customers" style="display:none;"></div>
  <div id="view-stock" style="display:none;"></div>
  <div id="view-reports" style="display:none;"></div>
  <div id="view-gst-calc" style="display:none;"></div>
  <div id="view-payment-methods" style="display:none;"></div>
  <div id="view-settings" style="display:none;"></div>
  <div id="view-how-to-use" style="display:none;"></div>
</main>
</div>
<div id="modal-area"></div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state = {
  lang:'en', cid:'',
  companies:[], products:[], customers:[], bills:[],
  sub:{plan:null,expiresAt:null},
  cfg:{prefix:'SH',startNo:1},
  payment:{upi:'',qrDataUrl:'',qrLabel:'Scan & Pay',razorpay:{keyId:'',keySecret:'',businessName:''},bank:{holderName:'',bankName:'',accountNo:'',ifscCode:'',branch:'',accountType:'Savings'}}
};
let currentView='dashboard';
const FREE_LIMIT=100;
const COLORS=['#f97316','#2563eb','#16a34a','#dc2626','#7c3aed','#db2777','#0891b2','#d97706'];
const SHOP_TYPES=['Grocery','Medical / Pharmacy','Sweet Shop','Restaurant','Clothing','Electronics','Stationary','Hardware','Bakery','General Store','Other'];
const SERVICE_TYPES=['Freelancer / Consultant','Doctor / Clinic','Lawyer / Advocate','CA / Accountant','Architect / Engineer','Photographer / Videographer','Tutor / Teacher','Designer (Graphic/UI)','IT / Software Developer','Event Planner','Interior Designer','Fitness Trainer','Salon / Beauty Professional','Other (Self-Employed)'];
const ALL_PROFILE_TYPES=[...SHOP_TYPES,...SERVICE_TYPES];
const UNITS=['pcs','kg','gm','ltr','ml','mtr','box','pack','dozen','bag','strip','tablet','pair'];
const SERVICE_UNITS=['hrs','days','project','session','month','visit','page','word','sqft','task','unit'];
const GST_RATES=[0,3,5,12,18,28];

// SAC codes for common services
const SAC_CODES={
  'Freelancer / Consultant':'998311',
  'Doctor / Clinic':'998221',
  'Lawyer / Advocate':'997212',
  'CA / Accountant':'997211',
  'Architect / Engineer':'998311',
  'Photographer / Videographer':'999711',
  'Tutor / Teacher':'999293',
  'Designer (Graphic/UI)':'998313',
  'IT / Software Developer':'997331',
  'Event Planner':'998596',
  'Interior Designer':'998391',
  'Fitness Trainer':'999721',
  'Salon / Beauty Professional':'999721',
};

function isServiceProfile(company){
  if(!company) return false;
  return SERVICE_TYPES.includes(company.type);
}
function getProfileLabel(company){
  return isServiceProfile(company)?'professional':'shop';
}
function getItemLabel(company){
  return isServiceProfile(company)?'Service':'Item';
}
function getClientLabel(company){
  return isServiceProfile(company)?'Client':'Customer';
}
function getDefaultUnit(company){
  return isServiceProfile(company)?'hrs':'pcs';
}
function getDefaultGST(company){
  return isServiceProfile(company)?18:18;
}
function getSACCode(company){
  if(!company) return '';
  return SAC_CODES[company.type]||'';
}

// ═══════════════════════════════════════════
// GST STATE MAP
// ═══════════════════════════════════════════
const GST_STATE_MAP={
  '01':'Jammu & Kashmir','02':'Himachal Pradesh','03':'Punjab','04':'Chandigarh',
  '05':'Uttarakhand','06':'Haryana','07':'Delhi','08':'Rajasthan','09':'Uttar Pradesh',
  '10':'Bihar','11':'Sikkim','12':'Arunachal Pradesh','13':'Nagaland','14':'Manipur',
  '15':'Mizoram','16':'Tripura','17':'Meghalaya','18':'Assam','19':'West Bengal',
  '20':'Jharkhand','21':'Odisha','22':'Chhattisgarh','23':'Madhya Pradesh','24':'Gujarat',
  '26':'Dadra & Nagar Haveli','27':'Maharashtra','28':'Andhra Pradesh','29':'Karnataka',
  '30':'Goa','31':'Lakshadweep','32':'Kerala','33':'Tamil Nadu','34':'Puducherry',
  '35':'Andaman & Nicobar','36':'Telangana','37':'Andhra Pradesh (New)','38':'Ladakh'
};

function getStateFromGSTIN(gstin){
  if(!gstin||gstin.length<2) return null;
  const code=gstin.slice(0,2);
  return GST_STATE_MAP[code]||null;
}
function validateGSTIN(g){
  if(!g) return false;
  const re=/^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/;
  return re.test(g.toUpperCase().replace(/\s/g,''));
}
function getGSTType(sellerGSTIN, buyerGSTIN){
  if(!sellerGSTIN||!buyerGSTIN) return 'cgst_sgst'; // default intra-state
  const sc=sellerGSTIN.slice(0,2), bc=buyerGSTIN.slice(0,2);
  return sc===bc?'cgst_sgst':'igst';
}

function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function escHtml(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return'';const dt=new Date(d+'T00:00');return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fmtRs(n){return'₹'+Number(n||0).toLocaleString('en-IN');}
function co(){return state.companies.find(c=>c.id===state.cid)||null;}
function myBills(){return state.bills.filter(b=>b.cid===state.cid);}
function myCusts(){return state.customers.filter(c=>c.cid===state.cid);}
function myProds(){return state.products.filter(p=>p.cid===state.cid);}
function canBill(){if(state.sub.plan&&new Date(state.sub.expiresAt)>new Date())return true;return myBills().length<FREE_LIMIT;}
function freeLeft(){return Math.max(0,FREE_LIMIT-myBills().length);}
function statusBadge(s){const m={paid:'b-paid',unpaid:'b-unpaid',partial:'b-partial'};return`<span class="badge ${m[s]||'b-unpaid'}">${s==='paid'?t('fullyPaid'):s==='partial'?t('partPaid'):t('notPaid')}</span>`;}
function saveState(){try{localStorage.setItem('sh2_state',JSON.stringify(state));}catch(e){}}
function loadState(){
  try{const raw=localStorage.getItem('sh2_state');if(raw){const s=JSON.parse(raw);state={...state,...s};if(!state.payment)state.payment={upi:'',qrDataUrl:'',qrLabel:'Scan & Pay',razorpay:{},bank:{accountType:'Savings'}};}}catch(e){}
}
function showToast(msg,color='var(--accent)'){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:24px;right:24px;background:#0f1623;color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;font-size:13px;z-index:9999;border-left:4px solid ${color};box-shadow:0 8px 24px rgba(0,0,0,.3);`;
  el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}
function rerender(view){const el=document.getElementById(`view-${view}`);if(el){el.innerHTML=renderView(view);attachViewEvents(view);}}

function updateTopbar(){
  const c=co();
  const isSvc=isServiceProfile(c);
  const coSel=document.getElementById('co-select');
  if(coSel) coSel.innerHTML='<option value="">— '+t('addCo')+' —</option>'+state.companies.map(x=>`<option value="${x.id}"${x.id===state.cid?' selected':''}>${escHtml(x.name)}</option>`).join('');
  const fb=document.getElementById('free-badge'),ub=document.getElementById('upgrade-top-btn');
  if(state.sub.plan&&new Date(state.sub.expiresAt)>new Date()){
    if(fb)fb.style.display='none';if(ub){ub.style.display='flex';ub.textContent='✓ '+state.sub.plan;}
  }else{
    if(fb){fb.style.display='flex';fb.textContent=`✦ ${freeLeft()} ${t('freeLeft')}`;}if(ub)ub.style.display='none';
  }
  const addBtn=document.getElementById('add-co-btn');
  if(addBtn)addBtn.textContent='+ '+t('addCo');
  // Update ALL sidebar labels with translated text
  const s=(id,txt)=>{const el=document.getElementById(id);if(el)el.textContent=txt;};
  s('sb-newbill-lbl',  isSvc ? t('newInvoice')     : t('newBill'));
  s('sb-dashboard-lbl',t('dashboard'));
  s('sb-bills-lbl',    isSvc ? t('allInvoices')    : t('bills'));
  s('sb-clients-lbl',  isSvc ? t('clients')        : t('customers'));
  s('sb-stock-lbl',    isSvc ? t('serviceCatalog') : t('stock'));
  s('sb-reports-lbl',  t('reports'));
  s('sb-tools-lbl',    t('tools'));
  s('sb-gstcalc-lbl',  t('gstCalc'));
  s('sb-setup-lbl',    t('setup'));
  s('sb-payment-lbl',  t('paymentMethods'));
  s('sb-settings-lbl', t('settings'));
  s('sb-howto-lbl',    t('howToUse'));
  const nbStock=document.getElementById('nb-stock');
  if(nbStock){const ic=nbStock.querySelector('.nav-icon');if(ic)ic.textContent=isSvc?'📋':'📦';}
}
function goTo(view){
  currentView=view;
  ['dashboard','new-bill','bills','customers','stock','reports','gst-calc','payment-methods','settings','how-to-use'].forEach(v=>{
    const el=document.getElementById(`view-${v}`);if(el)el.style.display='none';
  });
  document.getElementById('view-empty').style.display='none';
  document.querySelectorAll('.nav-btn').forEach(b=>{if(!b.classList.contains('new-bill-btn'))b.classList.remove('active');});
  const nb=document.getElementById(`nb-${view}`);if(nb&&!nb.classList.contains('new-bill-btn'))nb.classList.add('active');
  if(!co()&&view!=='settings'&&view!=='how-to-use'){document.getElementById('view-empty').style.display='flex';return;}
  const el=document.getElementById(`view-${view}`);
  if(el){el.style.display='block';el.innerHTML=renderView(view);attachViewEvents(view);}
}
function renderView(view){
  if(view==='dashboard')return renderDashboard();
  if(view==='new-bill')return renderNewBill();
  if(view==='bills')return renderBills();
  if(view==='customers')return renderCustomers();
  if(view==='stock')return renderStock();
  if(view==='reports')return renderReports();
  if(view==='gst-calc')return renderGSTCalc();
  if(view==='payment-methods')return renderPaymentMethods();
  if(view==='settings')return renderSettings();
  if(view==='how-to-use')return renderHowToUse();
  return '';
}
function attachViewEvents(view){if(view==='new-bill')renderItemsTable();}

  currentGSTType=type;
  const intraBtn=document.getElementById('gst-btn-intra');
  const igstBtn=document.getElementById('gst-btn-igst');

    if(intraBtn){intraBtn.style.background='#fff';intraBtn.style.color='var(--muted)';intraBtn.style.borderColor='var(--border)';}
    if(igstBtn){igstBtn.style.background='var(--blue)';igstBtn.style.color='#fff';igstBtn.style.borderColor='var(--blue)';}
    if(badge){badge.className='gst-type-badge b-igst';badge.textContent='⟷ IGST (Inter-State)';}
  }else{
    if(intraBtn){intraBtn.style.background='var(--accent)';intraBtn.style.color='#fff';intraBtn.style.borderColor='var(--accent)';}
    if(igstBtn){igstBtn.style.background='#fff';igstBtn.style.color='var(--muted)';igstBtn.style.borderColor='var(--border)';}
    if(badge){badge.className='gst-type-badge b-cgst';badge.textContent='⊕ CGST + SGST (Intra-State)';}
  }
  renderItemsTable();
}

function onCustGSTINChange(val){
  billForm.custGSTIN=val.toUpperCase();
  const infoEl=document.getElementById('cust-gstin-info');
  const c=co();
  if(val.length>=2){
    const custState=getStateFromGSTIN(val);
    if(custState){
      const newType=getGSTType(c.gstin||'',val);
      setGSTType(newType);
      if(infoEl) infoEl.innerHTML=`<span style="color:var(--green)">✓ Customer state: <strong>${custState}</strong> → Auto-selected: <strong>${newType==='igst'?'IGST':'CGST+SGST'}</strong></span>`;
    }else{
      if(infoEl) infoEl.innerHTML=`<span style="color:var(--muted)">State code: ${val.slice(0,2)}</span>`;
    }
  }else{
    if(infoEl) infoEl.textContent='';

}

function fillCustomer(id){
  const cx=state.customers.find(x=>x.id===id);if(!cx)return;
  const n=document.getElementById('f-custName'),p=document.getElementById('f-custPhone'),g=document.getElementById('f-custGSTIN');
  if(n)n.value=cx.name;if(p)p.value=cx.phone||'';if(g&&cx.gstin){g.value=cx.gstin;onCustGSTINChange(cx.gstin);}
  billForm.custName=cx.name;billForm.custPhone=cx.phone||'';billForm.custId=cx.id;
}

function renderItemsTable(){
  const tbody=document.getElementById('items-tbody');if(!tbody)return;
  const c=co();const isSvc=isServiceProfile(c);
  const prods=myProds();
  const datalist=prods.map(p=>`<option value="${escHtml(p.name)}">`).join('');
  const isIGST=currentGSTType==='igst';
  const thTax=document.getElementById('th-tax-detail');
  if(thTax)thTax.textContent=isIGST?'IGST':'CGST/SGST';
  const unitList=isSvc?SERVICE_UNITS:UNITS;
  tbody.innerHTML=`<datalist id="dl-prods">${datalist}</datalist>`+
    billItems.map(item=>{
      const taxAmt=item.qty*item.price*(item.taxRate/100);
      const half=taxAmt/2;
      const taxDisplay=isIGST
        ?`<span style="font-size:11px;color:var(--blue)">IGST ₹${Math.round(taxAmt)}</span>`
        :`<span style="font-size:11px;color:var(--muted)">C:₹${half.toFixed(0)} S:₹${half.toFixed(0)}</span>`;
      return`<tr>
        <td>
          <input class="inp" list="dl-prods" value="${escHtml(item.name)}" placeholder="${isSvc?'Service description...':'Product name...'}" onchange="updateItem('${item.id}','name',this.value)">
          ${isSvc?`<input class="inp" style="margin-top:4px;font-size:11px;color:var(--muted)" value="${escHtml(item.description||'')}" placeholder="Additional details (optional)" oninput="updateItemField('${item.id}','description',this.value)">`:''}
        </td>
        ${isSvc?`<td><input class="inp" value="${escHtml(item.sac||getSACCode(c)||'')}" placeholder="SAC" style="font-size:11px" oninput="updateItemField('${item.id}','sac',this.value)"></td>`:''}
        <td><input class="inp" type="number" min="0.01" step="0.01" value="${item.qty}" onchange="updateItem('${item.id}','qty',parseFloat(this.value)||0)"></td>
        <td><input class="inp" type="number" min="0" value="${item.price}" onchange="updateItem('${item.id}','price',parseFloat(this.value)||0)"></td>
        <td><select class="inp" onchange="updateItem('${item.id}','taxRate',parseFloat(this.value)||0)">${GST_RATES.map(r=>`<option value="${r}"${r===item.taxRate?' selected':''}>${r}%</option>`).join('')}</select></td>
        <td><select class="inp" onchange="updateItem('${item.id}','unit',this.value)">${unitList.map(u=>`<option${u===item.unit?' selected':''}>${u}</option>`).join('')}</select></td>
        <td>${taxDisplay}</td>
        <td style="font-weight:700;color:var(--accent);white-space:nowrap">₹${Math.round(item.qty*item.price*(1+item.taxRate/100))}</td>
        <td>${billItems.length>1?`<button class="ab-r" onclick="removeItem('${item.id}')">×</button>`:''}</td>
      </tr>`;}).join('');
  calcTotals();
}

function updateItem(id,k,v){
  const item=billItems.find(i=>i.id===id);if(!item)return;
  item[k]=v;
  if(k==='name'){
    const p=myProds().find(x=>x.name===v);
    if(p){item.price=p.salePrice;item.taxRate=p.tax||18;item.unit=p.unit;if(p.sac)item.sac=p.sac;}
  }
  renderItemsTable();
}
function updateItemField(id,k,v){const item=billItems.find(i=>i.id===id);if(item)item[k]=v;}
function addBillItem(){
  const c=co();const isSvc=isServiceProfile(c);
  billItems.push({id:uid(),name:'',qty:1,price:0,taxRate:18,unit:getDefaultUnit(c),sac:getSACCode(c),description:''});
  renderItemsTable();
}
function removeItem(id){billItems=billItems.filter(i=>i.id!==id);renderItemsTable();}

function calcTotals(){
  const sub=billItems.reduce((s,i)=>s+i.qty*i.price,0);
  const isIGST=currentGSTType==='igst';
  const gstBreakdown=billItems.reduce((acc,i)=>{
    const rate=i.taxRate;const taxAmt=i.qty*i.price*(rate/100);
    if(!acc[rate])acc[rate]={rate,taxable:0,igst:0,cgst:0,sgst:0};
    acc[rate].taxable+=i.qty*i.price;
    if(isIGST)acc[rate].igst+=taxAmt;else{acc[rate].cgst+=taxAmt/2;acc[rate].sgst+=taxAmt/2;}
    return acc;
  },{});
  const totalTax=Object.values(gstBreakdown).reduce((s,g)=>s+g.igst+g.cgst+g.sgst,0);
  const disc=parseFloat(document.getElementById('f-disc')?.value)||0;
  const total=Math.round(sub+totalTax-disc);
  const paid=parseFloat(document.getElementById('f-paid')?.value)||0;
  const due=total-paid;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('tot-sub','₹'+Math.round(sub));set('tot-total','₹'+total);set('tot-due','₹'+due);
  const gstRows=document.getElementById('tot-gst-rows');
  if(gstRows){
    const rows=Object.values(gstBreakdown).filter(g=>g.rate>0).map(g=>{
      if(isIGST)return`<div class="tot-row"><span class="tot-label">IGST @${g.rate}% (on ₹${Math.round(g.taxable)})</span><span class="tot-val" style="color:var(--blue)">₹${Math.round(g.igst)}</span></div>`;
      return`<div class="tot-row"><span class="tot-label">CGST @${g.rate/2}% + SGST @${g.rate/2}% (on ₹${Math.round(g.taxable)})</span><span class="tot-val" style="color:var(--muted)">₹${Math.round(g.cgst+g.sgst)}</span></div>`;
    }).join('');
    gstRows.innerHTML=rows||`<div class="tot-row"><span class="tot-label">GST</span><span class="tot-val">₹0</span></div>`;
  }
  const db=document.getElementById('due-box');
  if(db){
    db.className=due>0?'due-box':'due-box ok';
    const dueSpan=document.getElementById('tot-due');
    if(dueSpan)dueSpan.style.color=due>0?'var(--red)':'var(--green)';
    const dueLabel=db.querySelector('span:first-child');
    if(dueLabel)dueLabel.style.color=due>0?'var(--red)':'var(--green)';
  }
  return{sub,totalTax,total,paid,due,gstBreakdown,isIGST};
}

function submitBill(){
  if(!canBill()){showUpgrade();return;}
  const c=co();const isSvc=isServiceProfile(c);
  const custName=document.getElementById('f-custName')?.value?.trim();
  if(!custName){alert(`Enter ${getClientLabel(c)} name`);return;}
  const validItems=billItems.filter(i=>i.name.trim());
  if(!validItems.length){alert(`Add at least one ${getItemLabel(c).toLowerCase()}`);return;}
  const {sub,totalTax,total,paid,due,gstBreakdown,isIGST}=calcTotals();
  const finalPaid=Math.min(total,paid);
  const status=finalPaid<=0?'unpaid':finalPaid>=total?'paid':'partial';
  const disc=parseFloat(document.getElementById('f-disc')?.value)||0;
  const bill={
    id:uid(),cid:state.cid,
    billNo:document.getElementById('f-billNo')?.value||billForm.billNo,
    date:document.getElementById('f-date')?.value||todayStr(),
    dueDate:document.getElementById('f-duedate')?.value||'',
    ref:document.getElementById('f-ref')?.value||'',
    customerName:custName,
    customerPhone:document.getElementById('f-custPhone')?.value||'',
    customerEmail:document.getElementById('f-custemail')?.value||'',
    customerGSTIN:(document.getElementById('f-custGSTIN')?.value||'').toUpperCase(),
    sellerGSTIN:(document.getElementById('f-sellerGSTIN')?.value||c?.gstin||'').toUpperCase(),
    customerId:billForm.custId||'',
    items:validItems,subtotal:sub,taxTotal:totalTax,discount:disc,
    total:Math.round(sub+totalTax-disc),
    paid:finalPaid,status,gstBreakdown,gstType:isIGST?'igst':'cgst_sgst',
    isService:isSvc,
    notes:document.getElementById('f-notes')?.value||'',
    createdAt:new Date().toISOString()
  };
  state.bills.unshift(bill);
  // Only deduct stock for product-based profiles
  if(!isSvc){
    validItems.forEach(item=>{state.products=state.products.map(p=>p.cid===state.cid&&p.name===item.name?{...p,stock:Math.max(0,p.stock-item.qty)}:p);});
  }
  if(bill.customerId){const dueAmt=bill.total-bill.paid;state.customers=state.customers.map(c=>c.id===bill.customerId?{...c,balance:(c.balance||0)+dueAmt}:c);}
  saveState();viewBill(bill.id);
}

let billFilter='all';let billSearch='';
function renderBills(){
  const c=co();const mb=myBills();
  const filtered=mb.filter(b=>{
    const ms=b.billNo.toLowerCase().includes(billSearch.toLowerCase())||(b.customerName||'').toLowerCase().includes(billSearch.toLowerCase());
    return ms&&(billFilter==='all'||b.status===billFilter);
  });
  return`<div class="page-header">
    <div><div class="page-title">🧾 ${t('bills')}</div><div class="page-sub">${mb.length} ${t('bills')} • ${escHtml(c.name)}</div></div>
    <button class="btn-p" onclick="goTo('new-bill')">＋ ${t('newBill')}</button>
  </div>
  <div class="card">
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <div class="sbox"><span>🔍</span><input value="${escHtml(billSearch)}" placeholder="${t('search')}" oninput="billSearch=this.value;rerender('bills')"></div>
      <div class="ftabs">
        <button class="ftab ${billFilter==='all'?'active':''}" onclick="billFilter='all';rerender('bills')">All</button>
        <button class="ftab ${billFilter==='paid'?'active':''}" onclick="billFilter='paid';rerender('bills')">${t('fullyPaid')}</button>
        <button class="ftab ${billFilter==='unpaid'?'active':''}" onclick="billFilter='unpaid';rerender('bills')">${t('notPaid')}</button>
        <button class="ftab ${billFilter==='partial'?'active':''}" onclick="billFilter='partial';rerender('bills')">${t('partPaid')}</button>
      </div>
    </div>
    ${filtered.length===0?`<div class="empty"><div class="empty-icon">🧾</div>${t('noData')}</div>`:
    `<div style="overflow-x:auto"><table><thead><tr>
      <th>${t('billNo')}</th><th>${t('date')}</th><th>Customer</th><th>${t('total')}</th><th>GST Type</th><th>${t('status')}</th><th></th>
    </tr></thead><tbody>
    ${filtered.map(b=>`<tr style="cursor:pointer" onclick="viewBill('${b.id}')">
      <td style="font-weight:800;color:var(--accent)">${escHtml(b.billNo)}</td>
      <td style="color:var(--muted);font-size:12px">${fmtDate(b.date)}</td>
      <td style="font-weight:600">${escHtml(b.customerName||'—')}</td>
      <td style="font-weight:800">${fmtRs(b.total)}</td>
      <td><span class="badge ${b.gstType==='igst'?'b-igst':'b-cgst'}">${b.gstType==='igst'?'IGST':'C+S'}</span></td>
      <td>${statusBadge(b.status)}</td>
      <td onclick="event.stopPropagation()"><div class="acts">
        <button class="ab" onclick="viewBill('${b.id}')">👁</button>
        ${b.status!=='paid'?`<button class="ab-g" onclick="markPaidBill('${b.id}')">✓</button>`:''}
        <button class="ab-r" onclick="deleteBill('${b.id}')">🗑</button>
      </div></td>
    </tr>`).join('')}
    </tbody></table></div>`}
  </div>`;
}
function markPaidBill(id){
  const bill=state.bills.find(b=>b.id===id);if(!bill)return;
  const diff=bill.total-bill.paid;bill.paid=bill.total;bill.status='paid';
  if(bill.customerId)state.customers=state.customers.map(c=>c.id===bill.customerId?{...c,balance:Math.max(0,(c.balance||0)-diff)}:c);
  saveState();rerender('bills');
}
function deleteBill(id){if(!confirm('Delete this bill?'))return;state.bills=state.bills.filter(b=>b.id!==id);saveState();rerender('bills');}

function buildGSTTable(bill){
  const gb=bill.gstBreakdown||{};
  const isIGST=bill.gstType==='igst';
  const rows=Object.values(gb).filter(g=>g.rate>0);
  if(!rows.length)return'';
  if(isIGST){
    return`<table style="width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px">
      <thead><tr style="background:#eff6ff"><th style="padding:6px 10px;text-align:left;border:1px solid #bfdbfe;color:#1d4ed8">HSN/SAC</th><th style="padding:6px 10px;text-align:right;border:1px solid #bfdbfe;color:#1d4ed8">Taxable</th><th style="padding:6px 10px;text-align:center;border:1px solid #bfdbfe;color:#1d4ed8">IGST %</th><th style="padding:6px 10px;text-align:right;border:1px solid #bfdbfe;color:#1d4ed8">IGST Amt</th></tr></thead>
      <tbody>${rows.map(g=>`<tr><td style="padding:5px 10px;border:1px solid #e5e7eb">—</td><td style="padding:5px 10px;border:1px solid #e5e7eb;text-align:right">₹${Math.round(g.taxable)}</td><td style="padding:5px 10px;border:1px solid #e5e7eb;text-align:center">${g.rate}%</td><td style="padding:5px 10px;border:1px solid #e5e7eb;text-align:right;font-weight:700;color:#1d4ed8">₹${Math.round(g.igst)}</td></tr>`).join('')}
      <tr style="background:#eff6ff"><td colspan="3" style="padding:6px 10px;border:1px solid #bfdbfe;font-weight:700">Total IGST</td><td style="padding:6px 10px;border:1px solid #bfdbfe;text-align:right;font-weight:800;color:#1d4ed8">₹${Math.round(rows.reduce((s,g)=>s+g.igst,0))}</td></tr>
      </tbody></table>`;
  }
  return`<table style="width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px">
    <thead><tr style="background:#fdf4ff"><th style="padding:6px 10px;text-align:left;border:1px solid #e9d5ff;color:#7c3aed">Taxable</th><th style="padding:6px 10px;text-align:center;border:1px solid #e9d5ff;color:#7c3aed">Rate</th><th style="padding:6px 10px;text-align:right;border:1px solid #e9d5ff;color:#7c3aed">CGST @${rows[0]?.rate/2}%</th><th style="padding:6px 10px;text-align:right;border:1px solid #e9d5ff;color:#7c3aed">SGST @${rows[0]?.rate/2}%</th><th style="padding:6px 10px;text-align:right;border:1px solid #e9d5ff;color:#7c3aed">Total</th></tr></thead>
    <tbody>${rows.map(g=>`<tr><td style="padding:5px 10px;border:1px solid #e5e7eb">₹${Math.round(g.taxable)}</td><td style="padding:5px 10px;border:1px solid #e5e7eb;text-align:center">${g.rate}%</td><td style="padding:5px 10px;border:1px solid #e5e7eb;text-align:right">₹${Math.round(g.cgst)}</td><td style="padding:5px 10px;border:1px solid #e5e7eb;text-align:right">₹${Math.round(g.sgst)}</td><td style="padding:5px 10px;border:1px solid #e5e7eb;text-align:right;font-weight:700;color:#7c3aed">₹${Math.round(g.cgst+g.sgst)}</td></tr>`).join('')}
    <tr style="background:#fdf4ff"><td colspan="4" style="padding:6px 10px;border:1px solid #e9d5ff;font-weight:700">Total Tax</td><td style="padding:6px 10px;border:1px solid #e9d5ff;text-align:right;font-weight:800;color:#7c3aed">₹${Math.round(rows.reduce((s,g)=>s+g.cgst+g.sgst,0))}</td></tr>
    </tbody></table>`;
}

function viewBill(id){
  const bill=state.bills.find(b=>b.id===id);if(!bill)return;
  const c=co();const due=bill.total-bill.paid;const isIGST=bill.gstType==='igst';
  const pm=state.payment;const upiId=pm.upi||c.upiId||'';
  const waMsg=`🧾 *INVOICE — ${c.name}*\n━━━━━━━━━━━━━\nBill: *#${bill.billNo}* | ${fmtDate(bill.date)}\n\n*Items:*\n${bill.items.map(i=>`• ${i.name} × ${i.qty} ${i.unit} = ₹${Math.round(i.qty*i.price)}`).join('\n')}\n\n━━━━━━━━━━━━━\nSubtotal: ₹${Math.round(bill.subtotal)}\n${isIGST?`IGST: ₹${Math.round(bill.taxTotal||0)}`:`CGST+SGST: ₹${Math.round(bill.taxTotal||0)}`}\n${bill.discount>0?`Discount: -₹${bill.discount}\n`:''}\n*Total: ₹${bill.total}*\n✅ Paid: ₹${bill.paid}\n${due>0?`⚠️ *Due: ₹${due}*\n💳 Pay UPI: *${upiId}*`:'✅ Fully Paid'}\n\nThank you! 🙏`;
  const modal=document.createElement('div');
  modal.className='overlay';
  modal.innerHTML=`<div class="modal" style="max-width:780px;padding:20px">
    <div class="modal-head">
      <span class="modal-title">🧾 #${escHtml(bill.billNo)} — ${escHtml(bill.customerName||'')}</span>
      <button class="close-btn" onclick="this.closest('.overlay').remove()">✕</button>
    </div>
    <div id="printable-bill">${buildInvoiceHTML(bill,'a4')}</div>
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--border)" class="no-print">
      <button class="btn-blue" onclick="printA4('${bill.id}')">🖨 A4 Print</button>
      <button class="btn-s" onclick="printThermal('${bill.id}')">🌡 Thermal (80mm)</button>
      <button class="btn-p" onclick="savePDF('${bill.id}')" style="background:#dc2626">📄 Save PDF</button>
      ${bill.customerPhone?`<a href="https://wa.me/91${bill.customerPhone.replace(/\D/g,'')}?text=${encodeURIComponent(waMsg)}" target="_blank" class="btn-green" style="text-decoration:none">📲 WhatsApp</a>`:''}
      ${bill.status!=='paid'?`<button class="btn-s" onclick="markPaidBill('${bill.id}');this.closest('.overlay').remove()">✓ ${t('markPaid')}</button>`:''}
      <button class="btn-s" onclick="this.closest('.overlay').remove()">${t('cancel')}</button>
    </div>
  </div>`;
  document.getElementById('modal-area').innerHTML='';
  document.getElementById('modal-area').appendChild(modal);
}

function openPrintWindow(html, title, extraCss=''){
  const w=window.open('','_blank','width=900,height=750');
  w.document.write(`<!DOCTYPE html><html><head><title>${title}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>body{margin:0;padding:0;font-family:'DM Sans',Arial,sans-serif;}@media print{@page{${extraCss}}}</style>
  </head><body>${html}</body></html>`);
  w.document.close();setTimeout(()=>w.print(),500);
}

function printA4(id){
  const bill=state.bills.find(b=>b.id===id);if(!bill)return;
  openPrintWindow(buildInvoiceHTML(bill,'a4'),`Invoice #${bill.billNo}`,'size:A4;margin:15mm 12mm');
}
function printThermal(id){
  const bill=state.bills.find(b=>b.id===id);if(!bill)return;
  const css=`<style>body{width:80mm;margin:0;padding:4px;font-family:monospace;}@media print{@page{size:80mm auto;margin:2mm;}}</style>`;
  const w=window.open('','_blank','width=360,height=700');
  w.document.write(`<!DOCTYPE html><html><head><title>Thermal #${bill.billNo}</title>${css}</head><body>${buildInvoiceHTML(bill,'thermal')}</body></html>`);
  w.document.close();setTimeout(()=>w.print(),400);
}
function savePDF(id){
  const bill=state.bills.find(b=>b.id===id);if(!bill)return;
  const instrHtml=`<div style="position:fixed;top:0;left:0;right:0;background:#0f1623;color:#fff;padding:10px 20px;font-family:Arial;font-size:13px;z-index:999;text-align:center;display:flex;align-items:center;justify-content:center;gap:16px">
    <span>📄 To save as PDF: press <strong>Ctrl+P</strong> (or ⌘+P) → change Destination to <strong>"Save as PDF"</strong> → Save</span>
    <button onclick="window.print();this.parentElement.remove()" style="background:#f97316;color:#fff;border:none;border-radius:6px;padding:6px 16px;cursor:pointer;font-weight:700">🖨 Open Print/PDF Dialog</button>
  </div>`;
  const w=window.open('','_blank','width=900,height=750');
  w.document.write(`<!DOCTYPE html><html><head><title>Invoice_${bill.billNo}.pdf</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>body{margin:0;padding:0;font-family:'DM Sans',Arial,sans-serif;} .no-pdf-bar{} @media print{.no-pdf-bar{display:none!important;}@page{size:A4;margin:15mm 12mm;}}</style>
  </head><body>
    <div class="no-pdf-bar">${instrHtml}</div>
    ${buildInvoiceHTML(bill,'a4')}
  </body></html>`);
  w.document.close();
}

function showAddProd(){document.getElementById('add-prod-form').style.display='block';document.getElementById('np-name')?.focus();}

function updateStock(id,v){state.products=state.products.map(p=>p.id===id?{...p,stock:parseFloat(v)||0}:p);saveState();}

let reportPeriod='month';
function renderReports(){
  const c=co();const mb=myBills();const now=new Date();
  const fil=mb.filter(b=>{const d=new Date(b.date);if(reportPeriod==='today')return b.date===todayStr();if(reportPeriod==='week'){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}if(reportPeriod==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();return true;});
  const income=fil.reduce((s,b)=>s+b.total,0);const collected=fil.reduce((s,b)=>s+b.paid,0);const totalDue=fil.reduce((s,b)=>s+(b.total-b.paid),0);
  const igstTotal=fil.filter(b=>b.gstType==='igst').reduce((s,b)=>s+(b.taxTotal||0),0);
  const cgstTotal=fil.filter(b=>b.gstType!=='igst').reduce((s,b)=>s+(b.taxTotal||0)/2,0);
  const sgstTotal=cgstTotal;
  const cost=fil.reduce((s,b)=>s+b.items.reduce((ss,i)=>{const p=myProds().find(x=>x.name===i.name);return ss+(p?p.purchasePrice*i.qty:0);},0),0);
  const profit=income-cost;
  const dueCusts=myCusts().filter(cu=>cu.balance>0);const lowProds=myProds().filter(p=>p.stock<=p.minStock);
  return`<div class="page-header"><div class="page-title">📊 ${t('reports')}</div></div>
  <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">
    ${[['today',t('today')],['week',t('thisWeek')],['month',t('thisMonth')],['all',t('allTime')]].map(([v,l])=>`<button class="period-btn ${reportPeriod===v?'active':''}" onclick="reportPeriod='${v}';rerender('reports')">${l}</button>`).join('')}
  </div>
  <div class="stats-grid" style="margin-bottom:20px">
    <div class="stat-card" style="--sc:#f97316"><div class="stat-label">Total Sales</div><div class="stat-value">${fmtRs(income)}</div></div>

      <div><label style="font-size:10px;font-weight:700;color:#94a3b8;display:block;margin-bottom:5px;text-transform:uppercase">AMOUNT TYPE</label><select id="gc-type" onchange="calcGST()" style="width:100%;padding:10px 12px;border:1.5px solid #2d3748;border-radius:8px;background:#1e2738;color:#fff;font-size:14px;font-weight:700;font-family:inherit"><option value="exclusive">Exclusive (GST extra)</option><option value="inclusive">Inclusive (GST included)</option></select></div>
      <div><label style="font-size:10px;font-weight:700;color:#94a3b8;display:block;margin-bottom:5px;text-transform:uppercase">GST TYPE</label><select id="gc-gtype" onchange="calcGST()" style="width:100%;padding:10px 12px;border:1.5px solid #2d3748;border-radius:8px;background:#1e2738;color:#fff;font-size:14px;font-weight:700;font-family:inherit"><option value="cgst_sgst">CGST + SGST</option><option value="igst">IGST</option></select></div>

      <table><thead><tr><th>Rate</th><th>Category Examples</th></tr></thead><tbody>
        <tr><td><span class="badge b-ok">0%</span></td><td style="font-size:12px;color:var(--muted)">Essential food items, raw grains, vegetables, milk</td></tr>
        <tr><td><span class="badge" style="background:#e0f2fe;color:#0369a1">3%</span></td><td style="font-size:12px;color:var(--muted)">Gold, silver, precious stones</td></tr>
        <tr><td><span class="badge" style="background:#fefce8;color:#ca8a04">5%</span></td><td style="font-size:12px;color:var(--muted)">Sugar, tea, coffee, edible oil, footwear under ₹1000</td></tr>
        <tr><td><span class="badge" style="background:#fff7ed;color:#c2410c">12%</span></td><td style="font-size:12px;color:var(--muted)">Frozen meat, butter, cheese, fruit juice, medicine</td></tr>
        <tr><td><span class="badge b-igst">18%</span></td><td style="font-size:12px;color:var(--muted)">Electronics, soaps, detergents, restaurants, IT services</td></tr>
        <tr><td><span class="badge b-unpaid">28%</span></td><td style="font-size:12px;color:var(--muted)">Luxury cars, tobacco, aerated drinks, cement</td></tr>
      </tbody></table>
    </div>
    <div class="card"><div class="card-head">🗺️ State Code Quick Reference</div>
      <div style="overflow-y:auto;max-height:280px">
        <table><thead><tr><th>Code</th><th>State</th></tr></thead><tbody>
          ${Object.entries(GST_STATE_MAP).map(([k,v])=>`<tr><td style="font-weight:700">${k}</td><td style="font-size:12px">${v}</td></tr>`).join('')}
        </tbody></table>

function calcGST(){
  const amt=parseFloat(document.getElementById('gc-amount')?.value)||0;
  const rate=parseFloat(document.getElementById('gc-rate')?.value)||0;
  const type=document.getElementById('gc-type')?.value||'exclusive';
  const gtype=document.getElementById('gc-gtype')?.value||'cgst_sgst';
  let taxable,gst,total;
  if(type==='inclusive'){taxable=amt/(1+rate/100);gst=amt-taxable;total=amt;}
  else{taxable=amt;gst=amt*rate/100;total=amt+gst;}
  const half=gst/2;
  const res=document.getElementById('gst-result');
  const box=(label,val,color='#f97316')=>`<div style="background:#1e2738;border-radius:10px;padding:14px;border-top:3px solid ${color}"><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${label}</div><div style="font-size:22px;font-weight:900;color:${color}">₹${val.toFixed(2)}</div></div>`;
  if(!res)return;
  if(gtype==='igst'){
    res.innerHTML=box('Taxable Amount',taxable,'#94a3b8')+box('IGST @'+rate+'%',gst,'#3b82f6')+box('Total Amount',total,'#f97316')+box('Tax Saved vs 28%',Math.max(0,taxable*0.28-gst),'#16a34a');
  }else{
    res.innerHTML=box('Taxable Amount',taxable,'#94a3b8')+box('CGST @'+rate/2+'%',half,'#7c3aed')+box('SGST @'+rate/2+'%',half,'#a855f7')+box('Grand Total',total,'#f97316');
  }
}

function showCoModal(mode='shop'){
  let activeMode=mode;
  const modal=document.createElement('div');
  modal.className='overlay';
  const shopOpts=SHOP_TYPES.map(s=>`<option>${s}</option>`).join('');
  const svcOpts=SERVICE_TYPES.map(s=>`<option>${s}</option>`).join('');
  modal.innerHTML=`<div class="modal" style="max-width:500px">
    <div class="modal-head">
      <span class="modal-title" id="modal-co-title">${activeMode==='service'?'💼 Create Professional Profile':'🏪 Create Shop'}</span>
      <button class="close-btn" onclick="this.closest('.overlay').remove()">✕</button>
    </div>
    <!-- Mode Toggle -->
    <div style="display:flex;gap:8px;margin-bottom:18px;background:var(--light);border-radius:10px;padding:5px">
      <button id="mode-shop-btn" onclick="switchCoMode('shop')" style="flex:1;padding:8px;border:none;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;background:${activeMode==='shop'?'#fff':'transparent'};color:${activeMode==='shop'?'var(--accent)':'var(--muted)'};box-shadow:${activeMode==='shop'?'0 1px 4px rgba(0,0,0,.1)':'none'}">🏪 Shop / Business</button>
      <button id="mode-svc-btn" onclick="switchCoMode('service')" style="flex:1;padding:8px;border:none;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;background:${activeMode==='service'?'#fff':'transparent'};color:${activeMode==='service'?'var(--blue)':'var(--muted)'};box-shadow:${activeMode==='service'?'0 1px 4px rgba(0,0,0,.1)':'none'}">💼 Self-Employed / Professional</button>
    </div>
    <div class="fr"><label>Name *</label><input class="inp" id="m-coname" placeholder="${activeMode==='service'?'Your Name or Business Name':'My Shop Name'}" autofocus></div>
    <div class="fr"><label>${activeMode==='service'?'Profession / Type':'Shop Type'}</label>
      <select class="inp" id="m-cotype">${activeMode==='service'?svcOpts:shopOpts}</select>
    </div>
    <div class="fr"><label>Phone</label><input class="inp" id="m-cophone" placeholder="9876543210"></div>
    <div class="fr"><label>Address</label><input class="inp" id="m-coaddress" placeholder="${activeMode==='service'?'Your office/home address':'Shop address'}"></div>
    <div class="fr">
      <label>GSTIN <span style="font-size:10px;color:var(--muted)">(auto-detects your state)</span></label>
      <input class="inp" id="m-cogstin" placeholder="22AAAAA0000A1Z5" style="text-transform:uppercase" oninput="document.getElementById('m-state-info').textContent=getStateFromGSTIN(this.value.toUpperCase())||''">
      <div id="m-state-info" style="font-size:11px;color:var(--green);margin-top:3px;font-weight:600"></div>
    </div>
    <div class="fr"><label>UPI ID</label><input class="inp" id="m-coupi" placeholder="yourname@upi"></div>
    ${activeMode==='service'?`<div style="background:#f3e8ff;border-radius:8px;padding:10px 14px;font-size:12px;color:#7c3aed;margin-bottom:12px">
      💼 <strong>Professional mode:</strong> You'll get service-based invoices with SAC codes, client management, due dates, and project references. No stock management needed.
    </div>`:''}
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn-p" onclick="saveCoFromModal()" style="${activeMode==='service'?'background:var(--blue)':''}">💾 Create Profile</button>
      <button class="btn-s" onclick="this.closest('.overlay').remove()">Cancel</button>
    </div>
  </div>`;
  document.getElementById('modal-area').innerHTML='';
  document.getElementById('modal-area').appendChild(modal);
  setTimeout(()=>document.getElementById('m-coname')?.focus(),50);
}

function switchCoMode(mode){
  const shopOpts=SHOP_TYPES.map(s=>`<option>${s}</option>`).join('');
  const svcOpts=SERVICE_TYPES.map(s=>`<option>${s}</option>`).join('');
  const isSvc=mode==='service';
  const titleEl=document.getElementById('modal-co-title');
  if(titleEl)titleEl.textContent=isSvc?'💼 Create Professional Profile':'🏪 Create Shop';
  const typeEl=document.getElementById('m-cotype');
  if(typeEl)typeEl.innerHTML=isSvc?svcOpts:shopOpts;
  const nameEl=document.getElementById('m-coname');
  if(nameEl)nameEl.placeholder=isSvc?'Your Name or Business Name':'My Shop Name';
  const shopBtn=document.getElementById('mode-shop-btn');
  const svcBtn=document.getElementById('mode-svc-btn');
  if(shopBtn){shopBtn.style.background=isSvc?'transparent':'#fff';shopBtn.style.color=isSvc?'var(--muted)':'var(--accent)';shopBtn.style.boxShadow=isSvc?'none':'0 1px 4px rgba(0,0,0,.1)';}
  if(svcBtn){svcBtn.style.background=isSvc?'#fff':'transparent';svcBtn.style.color=isSvc?'var(--blue)':'var(--muted)';svcBtn.style.boxShadow=isSvc?'0 1px 4px rgba(0,0,0,.1)':'none';}
}
function saveCoFromModal(){
  const name=document.getElementById('m-coname')?.value?.trim();if(!name){alert('Enter shop name');return;}
  const c={id:uid(),name,type:document.getElementById('m-cotype')?.value||'Grocery',phone:document.getElementById('m-cophone')?.value||'',address:document.getElementById('m-coaddress')?.value||'',gstin:(document.getElementById('m-cogstin')?.value||'').toUpperCase(),upiId:document.getElementById('m-coupi')?.value||'',color:COLORS[state.companies.length%COLORS.length]};
  state.companies.push(c);state.cid=c.id;
  if(c.upiId)state.payment.upi=c.upiId;
  saveState();updateTopbar();document.querySelector('.overlay')?.remove();goTo('dashboard');
}

// ═══════════════════════════════════════════
// UPGRADE
// ═══════════════════════════════════════════
function showUpgrade(){
  const fl=freeLeft();
  const modal=document.createElement('div');
  modal.className='overlay';
  modal.innerHTML=`<div class="modal" style="max-width:520px;text-align:center">
    <button class="close-btn" style="position:absolute;right:16px;top:16px" onclick="this.closest('.overlay').remove()">✕</button>
    <div style="font-size:44px;margin-bottom:8px">🚀</div>
    <h2 style="font-size:22px;font-weight:900;margin-bottom:6px">Choose Your Plan</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:24px">${fl<=0?'100 free bills done!':fl+' free bills remaining'}</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;text-align:left">
      ${[{k:'monthly',l:'Monthly',p:99,save:null,hot:false},{k:'sixmonth',l:'6 Months',p:479,save:'Save ₹115',hot:true},{k:'yearly',l:'Yearly',p:799,save:'Save ₹389',hot:false}].map(pl=>`
        <div onclick="showPay('${pl.k}')" style="border:2px solid ${pl.hot?'var(--accent)':'var(--border)'};border-radius:12px;padding:16px;cursor:pointer;background:${pl.hot?'rgba(249,115,22,.06)':'#fff'};position:relative">
          ${pl.hot?`<div style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:10px;font-weight:800;padding:2px 12px;border-radius:20px;white-space:nowrap">BEST VALUE</div>`:''}
          <div style="font-weight:800;font-size:14px;margin-bottom:4px">${pl.l}</div>
          ${pl.save?`<div style="font-size:11px;color:var(--green);font-weight:700;margin-bottom:6px">${pl.save}</div>`:''}
          <div style="font-size:28px;font-weight:900;color:var(--accent)">₹${pl.p}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Unlimited Bills + GST</div>
          <button style="width:100%;margin-top:10px;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Select →</button>
        </div>`).join('')}
    </div>
    <button class="btn-s" style="width:100%;justify-content:center" onclick="this.closest('.overlay').remove()">Maybe Later</button>
  </div>`;
  document.getElementById('modal-area').innerHTML='';
  document.getElementById('modal-area').appendChild(modal);
}
function showPay(plan){
  const info={monthly:{l:'Monthly',p:99},sixmonth:{l:'6 Months',p:479},yearly:{l:'Yearly',p:799}};
  const pi=info[plan];const upiId=state.payment.upi||co()?.upiId||'sojaHisab@upi';
  document.querySelector('.overlay')?.remove();
  const modal=document.createElement('div');
  modal.className='overlay';
  modal.innerHTML=`<div class="modal" style="max-width:400px;text-align:center">
    <div style="font-size:44px;margin-bottom:8px">💳</div>
    <h2 style="font-size:20px;font-weight:900;margin-bottom:4px">Pay via UPI</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:20px">${pi.l} Plan — ₹${pi.p}</p>
    <div style="background:var(--light);border-radius:12px;padding:20px;margin-bottom:16px;border:2px dashed var(--border)">
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:700">SEND TO</div>
      <div style="font-size:18px;font-weight:900;color:var(--accent)">${upiId}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:8px">Amount: <strong>₹${pi.p}</strong></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn-p" style="padding:11px 28px" onclick="activatePlan('${plan}')">✓ Activate</button>
      <button class="btn-s" onclick="this.closest('.overlay').remove()">Cancel</button>
    </div>
  </div>`;
  document.getElementById('modal-area').innerHTML='';
  document.getElementById('modal-area').appendChild(modal);
}
function activatePlan(plan){
  const months={monthly:1,sixmonth:6,yearly:12}[plan];
  const exp=new Date();exp.setMonth(exp.getMonth()+months);
  state.sub={plan,expiresAt:exp.toISOString()};
  saveState();updateTopbar();document.querySelector('.overlay')?.remove();
  showToast('✅ Plan activated! Unlimited billing unlocked!','#16a34a');
}

// ═══════════════════════════════════════════
// LANG / CO SWITCH
// ═══════════════════════════════════════════
function setLang(l){
  state.lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`)?.classList.add('active');
  saveState();updateTopbar();goTo(currentView);
}
function switchCo(id){if(!id)return;state.cid=id;saveState();updateTopbar();goTo('dashboard');}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadState();updateTopbar();goTo('dashboard');
setTimeout(calcGST,100);
</script>
</body>
</html>
